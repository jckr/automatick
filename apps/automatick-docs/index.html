<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>automatick docs</title>
    <script>
      // Restore the saved theme before the first paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem('automatick-theme');
          if (saved === 'dark') document.documentElement.classList.add('dark');
          else if (saved === 'light') document.documentElement.classList.add('light');
        } catch (e) {}
      })();
    </script>
    <script>
      // Restore the path captured by 404.html so the router can render it.
      // https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          window.history.replaceState(
            null,
            '',
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
